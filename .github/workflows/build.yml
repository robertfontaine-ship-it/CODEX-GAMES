name: WRS Quest Build

on:
  pull_request:
  push:
    branches:
      - main
      - agent/wrs-quest-foundation
    paths-ignore:
      - preview/index.html

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run game-rule tests
        run: npm test

      - name: Build production app
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Generate portable browser preview
        run: node scripts/make-portable-preview.mjs

      - name: Upload production build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wrs-quest-production
          path: |
            dist
            preview/index.html
          if-no-files-found: error

      - name: Publish portable preview to main
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preview/index.html
          if git diff --cached --quiet; then
            echo "Portable preview is already current."
          else
            git commit -m "Publish repaired WRS Quest browser preview [skip ci]"
            git push origin HEAD:main
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrs-quest-build-log
          path: build.log
          if-no-files-found: warn
