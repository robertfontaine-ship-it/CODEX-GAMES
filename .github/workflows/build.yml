name: WRS Quest Build

on:
  pull_request:
  push:
    branches:
      - main
      - agent/wrs-quest-foundation

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build production app
        run: npm run build
