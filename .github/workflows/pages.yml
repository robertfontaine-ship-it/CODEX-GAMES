name: Deploy WRS Quest Preview

on:
  push:
    branches:
      - main
    paths-ignore:
      - DEPLOYMENT_STATUS.md
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: wrs-quest-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run game-rule tests
        run: npm test

      - name: Build production app
        run: npm run build

      - name: Ensure GitHub Pages is enabled
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request('POST /repos/{owner}/{repo}/pages', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                build_type: 'workflow'
              });
              core.info('GitHub Pages enabled for workflow deployment.');
            } catch (error) {
              if (error.status === 409 || error.status === 422) {
                core.info('GitHub Pages is already enabled.');
              } else {
                throw error;
              }
            }

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout main for deployment status
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Publish verified game URL
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          cat > DEPLOYMENT_STATUS.md <<EOF
          # WRS Quest Deployment

          Status: LIVE

          Game URL: ${PAGE_URL}

          Deployed commit: ${GITHUB_SHA}
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DEPLOYMENT_STATUS.md
          if git diff --cached --quiet; then
            echo "Deployment status is already current."
          else
            git commit -m "Record verified WRS Quest deployment URL"
            git push origin HEAD:main
          fi
